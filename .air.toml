root = "."
tmp_dir = "tmp"

[build]
  bin = "bin\\commandcode-go-proxy.exe"
  cmd = "go build -o bin\\commandcode-go-proxy.exe ."
  delay = 1000
  exclude_dir = ["tmp", "test", "bin", "node_modules", "riset"]
  exclude_file = []
  exclude_regex = []
  exclude_unchanged = true
  include_ext = ["go", "tpl", "tmpl", "html"]
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "green"
  runner = "cyan"
  watcher = "magenta"

[log]
  time = true

[watch]
  include_ext = ["go"]
  include_dir = ["internal", "."]
  exclude_dir = ["tmp", "test", "vendor", "bin", "node_modules", "riset"]
  exclude_regex = []
